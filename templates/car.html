<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motteck - Car</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='car.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <h1 class="title">
        <a href="{{ url_for('home') }}">MOTTECK</a>
    </h1>

    <div class="top-actions">
        <!-- ✅ removed onclick -->
        <button class="menu-btn">☰</button>
    </div>

</header>

<!-- ================= CATEGORY NAV ================= -->
<nav class="category-nav">
    <a href="{{ url_for('car') }}" class="{% if active_page == 'car'%}active{% endif %}">CAR</a>
    <a href="{{ url_for('truck') }}" class="{% if active_page == 'truck'%}active{% endif %}">TRUCK</a>
    <a href="{{ url_for('motobike') }}" class="{% if active_page == 'motobike'%}active{% endif %}" >BIKES</a>
    <a href="{{ url_for('plane') }}" class="{% if active_page == 'plane'%}active{% endif %}">AVIATION</a>
    <a href="{{ url_for('service') }}" class="{% if active_page == 'service'%}active{% endif %}">SERVICE</a>
</nav>

<!-- ================= MOBILE MENU ================= -->
<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('service') }}">Service</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</div>

<!-- ================= MAIN CONTENT ================= -->
<section class="main-section">

    {% if logged_in %}
    <form id="postform" method="POST" action="/add_post" enctype="multipart/form-data">
        <input type="hidden" name="category" value="car">
        <input type="text" name="title" placeholder="Car Title" required>
        <input type="file" name="image" accept="image/*" required>
        <textarea name="description" placeholder="Write your post..." required></textarea>
        <button type="submit">Publish Post</button>
    </form>
    {% endif %}

    <!-- SEARCH -->
    <div class="category-search">
        <input class="search-input" type="text" id="carSearch" placeholder="Search cars...">
    </div>

    <!-- POSTS -->
    <div id="carPost" class="post-container"></div>

</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <div class="footer-content">
        <h2>INFO</h2>
        <p>Follow us on all social media platforms</p>
    </div>

    <ul class="list">
        <li><a class="big" href="https://www.instagram.com/mott_eck" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a class="big" href="https://x.com/motteck254" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a></li>
        <li><a class="big" href="https://www.facebook.com/profile.php?id=100064234773365" target="_blank"><i class="fa-brands fa-facebook"></i></a></li>
    </ul>

    <div class="legal-links">
        <a href="{{ url_for('term') }}">Terms & Conditions</a>
        <span>•</span>
        <a href="{{ url_for('privacy') }}">Privacy Policy</a>
    </div>
</footer>

<!-- ================= JS ================= -->

<script src="{{ url_for('static', filename='post-manager.js')}}"></script>

<script>
const category = 'car';
const container = document.getElementById('carPost');
const searchInput = document.getElementById('carSearch');

let allPosts = [];

/* ✅ FIXED HAMBURGER (WORKS DESKTOP + MOBILE) */
const menuBtn = document.querySelector(".menu-btn");
const menu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", function(e){
    e.stopPropagation();
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", function(e){
    if(!menu.contains(e.target) && !menuBtn.contains(e.target)){
        menu.style.display = "none";
    }
});

/* ================= CONFIG ================= */
const LIMIT = 300;

function formatParagraphs(text){
    return text
        .split('\n')
        .filter(line => line.trim() !== '')
        .map(line => `<p>${line}</p>`)
        .join('');
}

function getPostBycategory(category){
    return fetch('/get_posts?t=' + new Date().getTime())
    .then(res => res.json())
    .then(posts => posts.filter(p => p.category === category))
    .catch(() => []);
}

function renderPosts(posts){
    container.innerHTML = '';

    if(!posts || posts.length === 0){
        container.innerHTML = `<p>No posts found.</p>`;
        return;
    }

    posts.forEach(post => {

        const card = document.createElement('div');
        card.classList.add('post-card');

        const formattedText = formatParagraphs(post.description);

        card.innerHTML = `
            <a href="/post/${post.id}" class="post-link">
                <img src="${post.image_url}">
            </a>

            <div class="post-content">

                <a href="/post/${post.id}" class="post-link">
                    <h3 class="post-title">${post.title}</h3>
                </a>

                <div class="post-text">${formattedText}</div>

                <div class="post-actions">

                    <button class="like-btn" id="like-${post.id}">
                        Like (<span id="count-${post.id}">${post.likes || 0}</span>)
                    </button>

                    {% if logged_in %}
                    <button class="delete-btn">Delete</button>
                    {% endif %}

                    <button class="see-more-btn">See more</button>

                </div>

            </div>
        `;

        card.querySelectorAll("button").forEach(btn => {
            btn.addEventListener("click", e => e.stopPropagation());
        });

        card.querySelector(`#like-${post.id}`).onclick = () => likePost(post.id);

        const del = card.querySelector(".delete-btn");
        if(del){
            del.onclick = () => deletePost(post.id);
        }

        const textDiv = card.querySelector(".post-text");
        const btn = card.querySelector(".see-more-btn");

        let expanded = false;
        const full = textDiv.innerHTML;
        const short = textDiv.innerText.slice(0, LIMIT) + "...";

        if(textDiv.innerText.length > LIMIT){
            textDiv.innerHTML = `<p>${short}</p>`;

            btn.onclick = () => {
                expanded = !expanded;
                textDiv.innerHTML = expanded ? full : `<p>${short}</p>`;
                btn.textContent = expanded ? "See less" : "See more";
            };
        } else {
            btn.style.display = "none";
        }

        container.appendChild(card);
    });
}

function showPosts(){
    getPostBycategory(category).then(posts => {
        allPosts = posts.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        renderPosts(allPosts);
    });
}

searchInput.addEventListener("input", function(){
    const value = this.value.toLowerCase();

    const filtered = allPosts.filter(post =>
        post.title.toLowerCase().includes(value) ||
        post.description.toLowerCase().includes(value)
    );

    renderPosts(filtered);
});

function likePost(id){
    fetch(`/like/${id}`, {method:'POST'})
    .then(res => res.json())
    .then(data => {
        document.getElementById(`count-${id}`).textContent = data.likes;
    });
}

function deletePost(id){
    if(!confirm("Delete?")) return;

    fetch(`/delete_post/${id}`, {method:'DELETE'})
    .then(() => location.reload());
}

showPosts();
</script>

</body>
</html>
