<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motteck - truck</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='truck.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <h1 class="title">
        <a href="{{ url_for('home') }}">MOTTECK</a>
    </h1>

    <div class="top-actions">
        <button class="menu-btn">☰</button>
    </div>
</header>

<!-- ================= CATEGORY NAV ================= -->
<nav class="category-nav">
    <a href="{{ url_for('car') }}" class="{% if active_page == 'car'%}active{% endif %}">CAR</a>
    <a href="{{ url_for('truck') }}" class="{% if active_page == 'truck'%}active{% endif %}">TRUCK</a>
    <a href="{{ url_for('motobike') }}" class="{% if active_page == 'motobike'%}active{% endif %}">BIKES</a>
    <a href="{{ url_for('plane') }}" class="{% if active_page == 'plane'%}active{% endif %}">AVIATION</a>
    <a href="{{ url_for('service') }}" class="{% if active_page == 'service'%}active{% endif %}">SERVICE</a>
</nav>

<!-- ================= MOBILE MENU ================= -->
<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('service') }}">Service</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</div>

<!-- ================= MAIN ================= -->
<section class="main-section">

    {% if logged_in %}
    <form method="POST" action="/add_post" enctype="multipart/form-data">
        <input type="hidden" name="category" value="car">
        <input type="text" name="title" placeholder="Car Title" required>
        <input type="file" name="image" required>
        <textarea name="description" placeholder="Write post..." required></textarea>
        <button type="submit">Publish</button>
    </form>
    {% endif %}

    <div class="category-search">
        <input type="text" id="truckSearch" placeholder="Search truck...">
    </div>

    <div id="truckPost" class="post-container"></div>

</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <div class="footer-content">
        <h2>INFO</h2>
        <p>Follow us on all social media platforms</p>
    </div>

    <!-- SOCIAL ICONS -->
    <ul class="list">
        <li><a class="big" href="https://www.instagram.com/mott_eck" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a class="big" href="https://x.com/motteck254?t=s82tjwt08Vy2TJAObwS63Q&s=09" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a></li>
        <li><a class="big" href="https://www.facebook.com/profile.php?id=100064234773365" target="_blank"><i class="fa-brands fa-facebook"></i></a></li>
    </ul>

    <!-- LEGAL LINKS -->
    <div class="legal-links">
        <a href="{{ url_for('term') }}">Terms & Conditions</a>
        <span>•</span>
        <a href="{{ url_for('privacy') }}">Privacy Policy</a>
    </div>
</footer>

<!-- ================= SCRIPT ================= -->
<script>

const category = "truck";
const container = document.getElementById("truckPost");
const searchInput = document.getElementById("truckSearch");

let allPosts = [];

const menuBtn = document.querySelector(".menu-btn");
const menu = document.getElementById("mobileMenu");

/* MENU */
menuBtn.addEventListener("click", e => {
    e.stopPropagation();
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", e => {
    if(!menu.contains(e.target) && !menuBtn.contains(e.target)){
        menu.style.display = "none";
    }
});

/* FORMAT TEXT */
function formatText(text){
    return text
        .split("\n")
        .filter(l => l.trim() !== "")
        .map(l => `<p>${l}</p>`)
        .join("");
}

/* GET POSTS */
function getPosts(){
    return fetch("/get_posts?t=" + Date.now())
        .then(res => res.json())
        .then(posts => posts.filter(p => p.category === category))
        .catch(() => []);
}

/* RENDER */
function render(posts){
    container.innerHTML = "";

    if(!posts.length){
        container.innerHTML = "<p>No posts found.</p>";
        return;
    }

    posts.forEach(post => {

        const card = document.createElement("div");
        card.className = "post-card";

        const text = formatText(post.description || "");

        card.innerHTML = `
            <a href="/post/${post.id}">
                <img src="${post.image_url}">
            </a>

            <div class="post-content">

                <a href="/post/${post.id}">
                    <h3>${post.title}</h3>
                </a>

                <p class="meta">
                    👁️ ${post.views || 0} • ❤️ ${post.likes || 0} • 🕒 ${post.time_ago || ""}
                </p>

                <div class="post-text">${text}</div>

                <div class="post-actions">

                    <button id="like-${post.id}">
                        Like (${post.likes || 0})
                    </button>

                    {% if logged_in %}
                    <button onclick="deletePost(${post.id})">Delete</button>
                    {% endif %}

                </div>
            </div>
        `;

        card.querySelector(`#like-${post.id}`).onclick = () => {
            fetch(`/like/${post.id}`, {method:"POST"})
            .then(r => r.json())
            .then(d => {
                card.querySelector(`#like-${post.id}`).innerText =
                    `Like (${d.likes})`;
            });
        };

        container.appendChild(card);
    });
}

/* INIT */
function load(){
    getPosts().then(data => {
        allPosts = data;
        render(allPosts);
    });
}

/* SEARCH */
searchInput.addEventListener("input", e => {
    const v = e.target.value.toLowerCase();

    const filtered = allPosts.filter(p =>
        p.title.toLowerCase().includes(v) ||
        p.description.toLowerCase().includes(v)
    );

    render(filtered);
});

/* DELETE */
function deletePost(id){
    if(!confirm("Delete?")) return;

    fetch(`/delete_post/${id}`, {method:"DELETE"})
        .then(() => location.reload());
}

load();

</script>

</body>
</html>
