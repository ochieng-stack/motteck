<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Motteck</title>

<link rel="stylesheet" href="{{ url_for('static', filename='admin_dashboard.css') }}">

</head>

<body>

<header>
    <h2>Motteck Admin Dashboard</h2>
    <a href="/logout" style="color:white;">Logout</a>
</header>

<div class="container">

<!-- ================= ANALYTICS ================= -->
<div class="form-box">
    <h3>Analytics</h3>

    <div id="analytics">
        Loading analytics...
    </div>
</div>

<!-- ================= SPONSORED TABLE ================= -->
<div class="form-box">
    <h3>Sponsored Ads Tracker</h3>

    <div id="sponsorTable">
        Loading sponsored ads...
    </div>
</div>

<!-- ================= POST FORM ================= -->
<div class="form-box">

    <h3>Create Post</h3>

    <form id="postForm" enctype="multipart/form-data">

        <input type="text" name="title" placeholder="Title" required>

        <select name="category">
            <option value="car">Car</option>
            <option value="truck">Truck</option>
            <option value="motobike">Bike</option>
            <option value="plane">Aviation</option>
            <option value="service">Service</option>
        </select>

        <input type="file" name="image" required>

        <textarea name="description" placeholder="Description" required></textarea>

        <label>
            <input type="checkbox" name="is_featured">
            Featured
        </label>

        <label>
            <input type="checkbox" name="is_sponsored">
            Sponsored
        </label>

        <button type="submit" id="publishBtn">Publish</button>

    </form>

</div>

<!-- ================= POSTS ================= -->
<div class="posts-box">

    <h3>All Posts</h3>

    <div id="posts"></div>

</div>

</div>

<!-- ================= EDIT MODAL ================= -->
<div id="editModal" class="modal">

    <div class="modal-content">

        <h3>Edit Post</h3>

        <form id="editForm" enctype="multipart/form-data">

            <input type="hidden" name="post_id" id="edit_id">

            <input type="text" name="title" id="edit_title">

            <select name="category" id="edit_category">
                <option value="car">Car</option>
                <option value="truck">Truck</option>
                <option value="motobike">Bike</option>
                <option value="plane">Aviation</option>
                <option value="service">Service</option>
            </select>

            <textarea name="description" id="edit_description"></textarea>

            <input type="file" name="image">

            <label>
                <input type="checkbox" name="is_featured" id="edit_featured">
                Featured
            </label>

            <label>
                <input type="checkbox" name="is_sponsored" id="edit_sponsored">
                Sponsored
            </label>

            <button type="submit">Save Changes</button>
            <button type="button" onclick="closeModal()">Close</button>

        </form>

    </div>

</div>

<script>

const postsContainer = document.getElementById("posts");
const form = document.getElementById("postForm");
const editForm = document.getElementById("editForm");
const analyticsBox = document.getElementById("analytics");
const sponsorTable = document.getElementById("sponsorTable");
const publishBtn = document.getElementById("publishBtn");

let allPosts = [];

/* ================= LOAD POSTS ================= */
function loadPosts(){

    fetch("/get_posts")
    .then(res => res.json())
    .then(data => {
        allPosts = data;
        render(data);
        loadSponsors(data);
    });
}

/* ================= ANALYTICS ================= */
function loadAnalytics(){

    fetch("/analytics")
    .then(res => res.json())
    .then(data => {

        analyticsBox.innerHTML = `
            <p>📦 Total Posts: ${data.total_posts}</p>
            <p>👁 Total Views: ${data.total_views}</p>
            <p>❤️ Total Likes: ${data.total_likes}</p>
        `;
    });
}

/* ================= SPONSOR TABLE ================= */
function loadSponsors(posts){

    const sponsored = posts.filter(p => p.is_sponsored);

    if(!sponsored.length){
        sponsorTable.innerHTML = "No sponsored posts.";
        return;
    }

    let html = `
        <table>
            <tr>
                <th>Post</th>
                <th>Status</th>
                <th>Expiry</th>
                <th>Days Left</th>
            </tr>
    `;

    sponsored.forEach(post => {

        let expiry = post.sponsored_until;

        if(!expiry){
            html += `
                <tr>
                    <td>${post.title}</td>
                    <td class="live">Live</td>
                    <td>Unlimited</td>
                    <td>--</td>
                </tr>
            `;
            return;
        }

        let end = new Date(expiry);
        let now = new Date();

        let diff = end - now;
        let days = Math.ceil(diff / (1000*60*60*24));

        let status = "";
        let cls = "";

        if(days < 0){
            status = "Expired";
            cls = "expired";
            days = 0;
        }else if(days <= 3){
            status = "Expiring Soon";
            cls = "soon";
        }else{
            status = "Live";
            cls = "live";
        }

        html += `
            <tr>
                <td>${post.title}</td>
                <td class="${cls}">${status}</td>
                <td>${end.toLocaleDateString()}</td>
                <td>${days}</td>
            </tr>
        `;
    });

    html += `</table>`;

    sponsorTable.innerHTML = html;
}

/* ================= RENDER POSTS ================= */
function render(posts){

    postsContainer.innerHTML = "";

    posts.forEach(post => {

        let badges = "";

        if(post.is_featured){
            badges += `<span class="badge featured">Featured</span>`;
        }

        if(post.is_sponsored){
            badges += `<span class="badge sponsored">Sponsored</span>`;
        }

        const div = document.createElement("div");
        div.className = "post-card";

        div.innerHTML = `
            ${badges}

            <div style="display:flex;gap:10px;align-items:center;">
                <img src="${post.image_url}" width="80">

                <div>
                    <h4>${post.title}</h4>
                    <small>${post.category}</small><br>
                    👁 ${post.views || 0} ❤️ ${post.likes || 0}
                </div>
            </div>

            <button onclick="openEdit(${post.id})">Edit</button>
            <button onclick="deletePost(${post.id})">Delete</button>
        `;

        postsContainer.appendChild(div);
    });
}

/* ================= DELETE ================= */
function deletePost(id){

    if(!confirm("Delete this post?")) return;

    fetch(`/delete_post/${id}`, {
        method:"DELETE"
    }).then(() => {
        loadPosts();
        loadAnalytics();
    });
}

/* ================= OPEN EDIT ================= */
function openEdit(id){

    fetch(`/get_post/${id}`)
    .then(res => res.json())
    .then(post => {

        document.getElementById("edit_id").value = post.id;
        document.getElementById("edit_title").value = post.title;
        document.getElementById("edit_category").value = post.category;
        document.getElementById("edit_description").value = post.description;
        document.getElementById("edit_featured").checked = post.is_featured;
        document.getElementById("edit_sponsored").checked = post.is_sponsored;

        document.getElementById("editModal").style.display = "block";
    });
}

/* ================= CLOSE ================= */
function closeModal(){
    document.getElementById("editModal").style.display = "none";
}

/* ================= EDIT ================= */
editForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    const id = document.getElementById("edit_id").value;
    const formData = new FormData(editForm);

    const res = await fetch(`/edit_post/${id}`, {
        method:"POST",
        body:formData
    });

    const data = await res.json();

    if(data.success){
        closeModal();
        loadPosts();
        loadAnalytics();
    }
});

/* ================= CREATE ================= */
form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(form);

    publishBtn.disabled = true;
    publishBtn.innerHTML = `<span class="spinner"></span> Publishing...`;

    try{

        const res = await fetch("/add_post", {
            method:"POST",
            body:formData
        });

        const data = await res.json();

        if(data.success){

            publishBtn.innerHTML = "✅ Published";
            publishBtn.style.background = "green";

            form.reset();

            loadPosts();
            loadAnalytics();

            setTimeout(() => {
                publishBtn.innerHTML = "Publish";
                publishBtn.disabled = false;
                publishBtn.style.background = "";
            }, 2000);

        }else{
            publishBtn.innerHTML = "❌ Failed";
            publishBtn.disabled = false;
        }

    }catch(error){
        publishBtn.innerHTML = "❌ Error";
        publishBtn.disabled = false;
    }
});

/* ================= INIT ================= */
loadPosts();
loadAnalytics();

</script>

</body>
</html>
