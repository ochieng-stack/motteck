<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motteck - Aviation</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='plane.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <h1 class="title">
        <a href="{{ url_for('home') }}">MOTTECK</a>
    </h1>

    <div class="top-actions">
        <button class="menu-btn">☰</button>
    </div>
</header>

<!-- ================= CATEGORY NAV ================= -->
<nav class="category-nav">
    <a href="{{ url_for('car') }}">CAR</a>
    <a href="{{ url_for('truck') }}">TRUCK</a>
    <a href="{{ url_for('motobike') }}">BIKES</a>
    <a href="{{ url_for('plane') }}" class="active">AVIATION</a>
    <a href="{{ url_for('service') }}">SERVICE</a>
</nav>

<!-- ================= MOBILE MENU ================= -->
<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('service') }}">Service</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</div>

<!-- ================= MAIN ================= -->
<section class="main-section">

    {% if logged_in %}
    <form method="POST" action="/add_post" enctype="multipart/form-data">

        <!-- ✈️ FIXED CATEGORY -->
        <input type="hidden" name="category" value="plane">

        <input type="text" name="title" placeholder="Aircraft Title" required>
        <input type="file" name="image" required>
        <textarea name="description" placeholder="Write aviation post..." required></textarea>

        <!-- ⭐ MONETIZATION OPTIONS -->
        <div class="post-options">

            <label>
                <input type="checkbox" name="is_sponsored">
                Sponsored Post
            </label>

            <label>
                <input type="checkbox" name="is_featured">
                Featured Post (Premium)
            </label>

        </div>

        <button type="submit">Publish</button>
    </form>
    {% endif %}

    <!-- ================= SEARCH ================= -->
    <div class="category-search">
        <input type="text" id="planeSearch" placeholder="Search aviation posts...">
    </div>

    <div id="planePost" class="post-container"></div>

</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <div class="footer-content">
        <h2>INFO</h2>
        <p>Follow us on all social media platforms</p>
    </div>

    <ul class="list">
        <li><a class="big" href="#"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a class="big" href="#"><i class="fa-brands fa-square-x-twitter"></i></a></li>
        <li><a class="big" href="#"><i class="fa-brands fa-facebook"></i></a></li>
    </ul>

    <div class="legal-links">
        <a href="{{ url_for('term') }}">Terms & Conditions</a>
        <span>•</span>
        <a href="{{ url_for('privacy') }}">Privacy Policy</a>
    </div>
</footer>

<!-- ================= SCRIPT ================= -->
<script>

const category = "plane";
const container = document.getElementById("planePost");
const searchInput = document.getElementById("planeSearch");

let allPosts = [];

/* MENU */
const menuBtn = document.querySelector(".menu-btn");
const menu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", e => {
    e.stopPropagation();
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", e => {
    if(!menu.contains(e.target) && !menuBtn.contains(e.target)){
        menu.style.display = "none";
    }
});

/* FORMAT TEXT */
function formatText(text){
    return text
        .split("\n")
        .filter(l => l.trim() !== "")
        .map(l => `<p>${l}</p>`)
        .join("");
}

/* GET POSTS (PLANE ONLY) */
function getPosts(){
    return fetch("/get_posts?t=" + Date.now())
        .then(res => res.json())
        .then(posts => posts.filter(p => p.category === "plane"))
        .catch(() => []);
}

/* RENDER */
function render(posts){
    container.innerHTML = "";

    if(!posts.length){
        container.innerHTML = "<p>No aviation posts found.</p>";
        return;
    }

    posts.forEach(post => {

        const card = document.createElement("div");
        card.className = "post-card";

        const text = formatText(post.description || "");

        /* BADGES */
        let badge = "";
        if(post.is_featured){
            badge += `<span class="badge featured">Featured</span>`;
        }
        if(post.is_sponsored){
            badge += `<span class="badge sponsored">Sponsored</span>`;
        }

        card.innerHTML = `
            ${badge}

            <a href="/post/${post.id}">
                <img src="${post.image_url}">
            </a>

            <div class="post-content">

                <a href="/post/${post.id}">
                    <h3>${post.title}</h3>
                </a>

                <p class="meta">
                    👁️ ${post.views || 0} • ❤️ ${post.likes || 0} • 🕒 ${post.time_ago || ""}
                </p>

                <div class="post-text">${text}</div>

                <div class="post-actions">

                    <button id="like-${post.id}">
                        Like (${post.likes || 0})
                    </button>

                    {% if logged_in %}
                    <button onclick="deletePost(${post.id})">Delete</button>
                    {% endif %}

                </div>
            </div>
        `;

        card.querySelector(`#like-${post.id}`).onclick = () => {
            fetch(`/like/${post.id}`, {method:"POST"})
            .then(r => r.json())
            .then(d => {
                card.querySelector(`#like-${post.id}`).innerText =
                    `Like (${d.likes})`;
            });
        };

        container.appendChild(card);
    });
}

/* LOAD */
function load(){
    getPosts().then(data => {
        allPosts = data;
        render(allPosts);
    });
}

/* SEARCH (AVIATION ONLY) */
searchInput.addEventListener("input", e => {
    const v = e.target.value.toLowerCase();

    const filtered = allPosts.filter(p =>
        (p.title && p.title.toLowerCase().includes(v)) ||
        (p.description && p.description.toLowerCase().includes(v)) ||
        (p.tags && p.tags.toLowerCase().includes(v))
    );

    render(filtered);
});

/* DELETE */
function deletePost(id){
    if(!confirm("Delete?")) return;

    fetch(`/delete_post/${id}`, {method:"DELETE"})
        .then(() => location.reload());
}

load();

</script>

</body>
</html>
