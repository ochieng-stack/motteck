<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motteck</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cars.css') }}">
</head>
<body>

<header>
    <div class="header">
        <h1 class="title">
            <a href="{{ url_for('home') }}">MOTTECK</a>
        </h1>
    </div>

    <nav class="category-nav">
        <a href="{{ url_for('cars') }}" class="{% if active_page == 'cars'%} active{% endif %}">CARS</a>
        <a href="{{ url_for('trucks') }}" class="{% if active_page == 'trucks'%} active{% endif %}">TRUCKS</a>
        <a href="{{ url_for('motobikes') }}" class="{% if active_page == 'motobikes'%} active{% endif %}">MOTORBIKE</a>
        <a href="{{ url_for('trains') }}" class="{% if active_page == 'trains'%} active{% endif %}">TRAIN</a>
        <a href="{{ url_for('plane') }}" class="{% if active_page == 'plane'%} active{% endif %}">PLANE</a>
        <a href="{{ url_for('services') }}" class="{% if active_page == 'services'%} active{% endif %}">SERVICES</a>
    </nav>
</header>

<section class="main-section">

    {% if logged_in %}
    <form id="postform" method="POST" action="/add_post" enctype="multipart/form-data" class="post-form">
        <input type="hidden" name="category" value="car">
        <input type="text" name="title" placeholder="Car Title" required>
        <input type="file" name="image" accept="image/*" required>
        <textarea name="description" placeholder="Write your post..." required></textarea>
        <button type="submit">Publish Post</button>
    </form>
    {% endif %}

    <h2 class="section-title">CAR</h2>

    <div id="carPost" class="post-container"></div>
</section>

<script src="{{ url_for('static', filename='post-manager.js')}}"></script>

<script>
const category = 'car';
const container = document.getElementById('carPost');

function formatParagraphs(text) {
    return text
        .split('\n')
        .filter(line => line.trim() !== '')
        .map(line => `<p>${line}</p>`)
        .join('');
}

function setupSeeMoreButtons(){
    const cards = document.querySelectorAll('.post-card');

    cards.forEach(card => {
        const btn = card.querySelector('.see-more-btn');
        const text = card.querySelector('.post-text');

        if (!btn || !text) return;

        const full = text.innerHTML;
        const limit = 300;

        if (text.innerText.length <= limit) {
            btn.style.display = "none";
            return;
        }

        let expanded = false;

        const short = text.innerText.slice(0, limit) + "...";
        text.innerHTML = `<p>${short}</p>`;

        btn.addEventListener("click", () => {
            expanded = !expanded;
            text.innerHTML = expanded ? full : `<p>${short}</p>`;
            btn.textContent = expanded ? "See less" : "See more";
        });
    });
}

function showPosts(){
    getPostBycategory(category).then(posts => {
        container.innerHTML = '';

        if (!posts || posts.length === 0) {
            container.innerHTML = `<p class="no-post">No posts found.</p>`;
            return;
        }

        posts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        posts.forEach(post => {

            const formattedText = formatParagraphs(post.description);

            const card = document.createElement('div');
            card.classList.add('post-card');

            card.innerHTML = `
            <a href="/post/${post.id}">
                <img src="${post.image_url}" class="post-image">
            </a>
            <div class="post-content">
                <a href="/post/${post.id}" class="post-link">
                    <h3 class="post-title">${post.title}</h3>
                </a>
                <div class="post-text">${formattedText}</div>
                <div class="post-actions">
                    <button id="like-btn-${post.id}" class="like-btn">
                        Like (<span id="like-count-${post.id}">${post.likes || 0}</span>)
                    </button>
                    {% if logged_in %}
                    <button class="delete-btn">Delete</button>
                    {% endif %}
                    <button class="see-more-btn">See more</button>
                </div>
            </div>
        `;

            // Stop click from opening post
            card.querySelectorAll("button").forEach(btn => {
                btn.addEventListener("click", e => e.stopPropagation());
            });

            // Like
            card.querySelector(`#like-btn-${post.id}`).onclick = () => likePost(post.id);

            // Delete
            const deleteBtn = card.querySelector(".delete-btn");
            if(deleteBtn){
                deleteBtn.onclick = () => deletePost(post.id);
            }

            container.prepend(card);
        });

        initPostFeatures();
    });
}

function getPostBycategory(category){
    return fetch('/get_posts?t=' + new Date().getTime())
    .then(res => res.json())
    .then(posts => posts.filter(p => p.category === category))
    .catch(() => []);
}

function likePost(postId){
    const likedKey = `liked-${postId}`;
    if (localStorage.getItem(likedKey)) {
        alert("Already liked!");
        return;
    }

    fetch(`/like/${postId}`, { method:'POST' })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            document.getElementById(`like-count-${postId}`).textContent = data.likes;
            localStorage.setItem(likedKey, "true");
        }
    });
}

function deletePost(postId){
    if (!confirm("Delete this post?")) return;

    fetch(`/delete_post/${postId}`, { method: 'DELETE' })
    .then(() => location.reload());
}

showPosts();
</script>

</body>
</html>
