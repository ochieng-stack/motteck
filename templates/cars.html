<!-- ================= HEADER ================= -->
<header class="header">

    <h1 class="title">
        <a href="{{ url_for('home') }}">MOTTECK</a>
    </h1>

    <div class="top-actions">

        <a href="{{ url_for('listings') }}" class="listings-btn">
            🚗 Listings
        </a>

        <button class="menu-btn" onclick="toggleMenu()">☰</button>

    </div>

</header>

<!-- ================= CATEGORY NAV ================= -->
<nav class="category-nav">

    <a href="{{ url_for('cars') }}" class="{% if active_page == 'cars'%}active{% endif %}">CARS</a>
    <a href="{{ url_for('trucks') }}">TRUCKS</a>
    <a href="{{ url_for('motobikes') }}">BIKES</a>
    <a href="{{ url_for('trains') }}">RAIL</a>
    <a href="{{ url_for('plane') }}">AVIATION</a>
    <a href="{{ url_for('services') }}">SERVICES</a>

</nav>

<!-- ================= MOBILE MENU (HOME STYLE ONLY) ================= -->
<div id="mobileMenu" class="mobile-menu">

    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('listings') }}">Listings</a>
    <a href="{{ url_for('services') }}">Services</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>

</div>

<!-- ================= MAIN ================= -->
<section class="main-section">

    {% if logged_in %}
    <form id="postform" method="POST" action="/add_post" enctype="multipart/form-data" class="post-form">

        <input type="hidden" name="category" value="car">

        <input type="text" name="title" placeholder="Car Title" required>

        <input type="file" name="image" accept="image/*" required>

        <textarea name="description" placeholder="Write your post..." required></textarea>

        <button type="submit">Publish Post</button>

    </form>
    {% endif %}

    <h2 class="section-title">CARS</h2>

    <!-- SEARCH (CENTERED, CONTROLLED WIDTH - FIX LATER IN CSS) -->
    <div class="category-search">
        <input type="text" id="carSearch" placeholder="Search cars...">
    </div>

    <!-- POSTS -->
    <div id="carPost" class="post-container"></div>

</section>

<!-- ================= JS ================= -->
<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    if (!menu) return;

    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

/* close when clicking outside */
document.addEventListener("click", function (e) {
    const menu = document.getElementById("mobileMenu");
    const btn = document.querySelector(".menu-btn");

    if (!menu || !btn) return;

    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = "none";
    }
});
</script>

<script src="{{ url_for('static', filename='post-manager.js')}}"></script>
