<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motteck - Cars</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='cars.css') }}">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <h1 class="title">
        <a href="{{ url_for('home') }}">MOTTECK</a>
    </h1>

    <div class="top-actions">

        <a href="{{ url_for('listings') }}" class="listings-btn">
            🚗 Listings
        </a>

        <button class="menu-btn" onclick="toggleMenu()">☰</button>

    </div>

</header>

<!-- ================= CATEGORY NAV ================= -->
<nav class="category-nav">

    <a href="{{ url_for('cars') }}" class="{% if active_page == 'cars'%}active{% endif %}">CARS</a>
    <a href="{{ url_for('trucks') }}">TRUCKS</a>
    <a href="{{ url_for('motobikes') }}">BIKES</a>
    <a href="{{ url_for('trains') }}">RAIL</a>
    <a href="{{ url_for('plane') }}">AVIATION</a>
    <a href="{{ url_for('services') }}">SERVICES</a>

</nav>

<!-- ================= MOBILE MENU ================= -->
<div id="mobileMenu" class="mobile-menu">

    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('listings') }}">Listings</a>
    <a href="{{ url_for('services') }}">Services</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>

</div>

<!-- ================= MAIN CONTENT ================= -->
<section class="main-section">

    <!-- POST FORM -->
    {% if logged_in %}
    <form id="postform" method="POST" action="/add_post" enctype="multipart/form-data">

        <input type="hidden" name="category" value="car">

        <input type="text" name="title" placeholder="Car Title" required>

        <input type="file" name="image" accept="image/*" required>

        <textarea name="description" placeholder="Write your post..." required></textarea>

        <button type="submit">Publish Post</button>

    </form>
    {% endif %}

    <!-- SECTION TITLE -->
    <h2 class="section-title">CARS</h2>

    <!-- SEARCH BAR (INSIDE SECTION ONLY) -->
    <div class="category-search">
        <input type="text" id="carSearch" placeholder="Search cars...">
    </div>

    <!-- POSTS -->
    <div id="carPost" class="post-container"></div>

</section>

<!-- ================= JS ================= -->
<script>
function toggleMenu(){
    const menu = document.getElementById("mobileMenu");

    if(!menu) return;

    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

document.addEventListener("click", function(e){
    const menu = document.getElementById("mobileMenu");
    const btn = document.querySelector(".menu-btn");

    if(!menu || !btn) return;

    if(!menu.contains(e.target) && !btn.contains(e.target)){
        menu.style.display = "none";
    }
});
</script>

<script src="{{ url_for('static', filename='post-manager.js')}}"></script>

<script>
const category = 'car';
const container = document.getElementById('carPost');

function formatParagraphs(text){
    return text
        .split('\n')
        .filter(line => line.trim() !== '')
        .map(line => `<p>${line}</p>`)
        .join('');
}

function getPostBycategory(category){
    return fetch('/get_posts?t=' + new Date().getTime())
    .then(res => res.json())
    .then(posts => posts.filter(p => p.category === category))
    .catch(() => []);
}

function showPosts(){
    getPostBycategory(category).then(posts => {

        container.innerHTML = '';

        if(!posts || posts.length === 0){
            container.innerHTML = `<p>No posts found.</p>`;
            return;
        }

        posts.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

        posts.forEach(post => {

            const card = document.createElement('div');
            card.classList.add('post-card');

            const formattedText = formatParagraphs(post.description);

            card.innerHTML = `
                <a href="/post/${post.id}">
                    <img src="${post.image_url}">
                </a>

                <div class="post-content">

                    <h3 class="post-title">${post.title}</h3>

                    <div class="post-text">${formattedText}</div>

                    <div class="post-actions">

                        <button class="like-btn" id="like-${post.id}">
                            Like (<span id="count-${post.id}">${post.likes || 0}</span>)
                        </button>

                        {% if logged_in %}
                        <button class="delete-btn">Delete</button>
                        {% endif %}

                        <button class="see-more-btn">See more</button>

                    </div>

                </div>
            `;

            // like
            card.querySelector(`#like-${post.id}`).onclick = () => likePost(post.id);

            // delete
            const del = card.querySelector(".delete-btn");
            if(del){
                del.onclick = () => deletePost(post.id);
            }

            container.appendChild(card);
        });
    });
}

function likePost(id){
    fetch(`/like/${id}`, {method:'POST'})
    .then(res => res.json())
    .then(data => {
        document.getElementById(`count-${id}`).textContent = data.likes;
    });
}

function deletePost(id){
    if(!confirm("Delete?")) return;

    fetch(`/delete_post/${id}`, {method:'DELETE'})
    .then(() => location.reload());
}

showPosts();
</script>

</body>
</html>
