<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motteck - Cars</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='cars.css') }}">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <!-- LOGO -->
    <h1 class="title">
        <a href="{{ url_for('home') }}">MOTTECK</a>
    </h1>

    <!-- ACTIONS -->
    <div class="top-actions">

        <a href="{{ url_for('listings') }}" class="listings-btn">
            🚗 Listings
        </a>

        <button class="menu-btn" onclick="toggleMenu()">
            ☰
        </button>

    </div>

</header>

<!-- ================= CATEGORY NAV ================= -->
<nav class="category-nav">

    <a href="{{ url_for('cars') }}" class="{% if active_page == 'cars'%}active{% endif %}">CARS</a>
    <a href="{{ url_for('trucks') }}" class="{% if active_page == 'trucks'%}active{% endif %}">TRUCKS</a>
    <a href="{{ url_for('motobikes') }}" class="{% if active_page == 'motobikes'%}active{% endif %}">BIKES</a>
    <a href="{{ url_for('trains') }}" class="{% if active_page == 'trains'%}active{% endif %}">RAIL</a>
    <a href="{{ url_for('plane') }}" class="{% if active_page == 'plane'%}active{% endif %}">AVIATION</a>
    <a href="{{ url_for('services') }}" class="{% if active_page == 'services'%}active{% endif %}">SERVICE</a>

</nav>

<!-- ================= MOBILE MENU ================= -->
<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('listings') }}">Listings</a>
    <a href="{{ url_for('cars') }}">Cars</a>
    <a href="{{ url_for('trucks') }}">Trucks</a>
    <a href="{{ url_for('services') }}">Services</a>
</div>

<!-- ================= MAIN ================= -->
<section class="main-section">

    {% if logged_in %}
    <form id="postform" method="POST" action="/add_post" enctype="multipart/form-data" class="post-form">

        <input type="hidden" name="category" value="car">

        <input type="text" name="title" placeholder="Car Title" required>

        <input type="file" name="image" accept="image/*" required>

        <textarea name="description" placeholder="Write your post..." required></textarea>

        <button type="submit">Publish Post</button>

    </form>
    {% endif %}

    <!-- TITLE -->
    <h2 class="section-title">CARS</h2>

    <!-- 🔍 SEARCH (CLEAN - ONLY CARS INSIDE) -->
    <div class="category-search">
        <input type="text" id="carSearch" placeholder="Search cars...">
    </div>

    <!-- POSTS -->
    <div id="carPost" class="post-container"></div>

</section>

<!-- ================= JS ================= -->
<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");

    if (!menu) return;

    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

/* close menu when clicking outside */
document.addEventListener("click", function (e) {
    const menu = document.getElementById("mobileMenu");
    const btn = document.querySelector(".menu-btn");

    if (!menu || !btn) return;

    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = "none";
    }
});
</script>

<script src="{{ url_for('static', filename='post-manager.js')}}"></script>

</body>
</html>
