<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact MOTTECK</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='contact.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="site-header">

    <div class="nav-left">
        <a href="{{ url_for('home') }}" class="logo"> MOTTECK</a>
    </div>
    <div class="nav-right">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

</header>

<!-- ================= MOBILE MENU ================= -->
<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('service') }}">Service</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</div>

<!-- ================= CONTACT SECTION ================= -->
<section class="contact">

    <form id="contact-form" action="{{ url_for('contact')}}" method="POST" class="form">

        <div class="row">
            <div class="input-group">
                <label for="firstname">FIRST NAME</label>
                <input type="text" id="firstname" name="firstname" placeholder="Firstname" required autocomplete="given-name">
            </div>

            <div class="input-group">
                <label for="lastname">LAST NAME</label>
                <input type="text" id="lastname" name="lastname" placeholder="Lastname" required autocomplete="family-name">
            </div>
        </div>

        <div class="input-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" name="email" placeholder="Email" required autocomplete="email">
        </div>

        <div class="input-group">
            <label for="text">MESSAGE</label>
            <textarea name="text" id="text" rows="8" placeholder="Write something..." required></textarea>
        </div>

        <button type="submit" id="submit-btn">SUBMIT</button>

        <span id="form-message" style="margin-left:10px; font-weight:bold;"></span>
        <span id="loader" class="loader" style="display:none;"></span>

    </form>

</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">

    <div class="footer-content">
        <h2>INFO</h2>
        <p>Follow us on all social media platforms</p>
    </div>

    <ul class="list">
        <li><a class="big" href="https://www.instagram.com/mott_eck" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a class="big" href="https://x.com/motteck254?t=s82tjwt08Vy2TJAObwS63Q&s=09" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a></li>
        <li><a class="big" href="https://www.facebook.com/profile.php?id=100064234773365" target="_blank"><i class="fa-brands fa-facebook"></i></a></li>
    </ul>

    <div class="legal-links">
        <a href="{{ url_for('term') }}">Terms & Conditions</a>
        <span>•</span>
        <a href="{{ url_for('privacy') }}">Privacy Policy</a>
    </div>

</footer>

<!-- ================= SCRIPTS ================= -->
<script>
/* ================= HAMBURGER MENU ================= */
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* ================= CONTACT FORM ================= */
document.querySelector('#contact-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formMessage = document.getElementById('form-message');
    const loader = document.getElementById('loader');
    const submitBtn = document.getElementById('submit-btn');

    formMessage.textContent = '';
    loader.style.display = 'inline-block';
    submitBtn.disabled = true;

    try {
        const response = await fetch(this.action, {
            method: 'POST',
            body: new FormData(this)
        });

        const result = await response.json();

        loader.style.display = 'none';
        submitBtn.disabled = false;

        if (result.status === 'success') {
            formMessage.style.color = 'green';
            formMessage.textContent = "✅ " + result.message;
            this.reset();
        } else {
            formMessage.style.color = 'red';
            formMessage.textContent = "❌ " + result.message;
        }

    } catch (err) {
        console.error(err);
        loader.style.display = 'none';
        submitBtn.disabled = false;
        formMessage.style.color = 'red';
        formMessage.textContent = "❌ Network error. Try again later.";
    }
});
</script>

</body>
</html>
