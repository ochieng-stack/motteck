<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTTECK</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="site-header">

    <div class="nav-left">
        <a href="{{ url_for('home') }}" class="logo"> MOTTECK</a>
    </div>

    <div class="nav-center">
        <form action="#" method="GET" class="search-form">
            <input type="text" id="searchInput" placeholder="Search cars, trucks, guides..." required>
            <button type="submit"><i class="fa fa-search"></i></button>
        </form>
    </div>

    <div class="nav-right">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>

</header>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('service') }}">Service</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</div>

<!-- ================= BROWSING ================= -->
<section class="pagetwo">
    <h2 class="brows">BROWSING TYPE</h2>

    <ul class="unlisttwo">
        <li><a href="/car" class="linkup">CAR</a></li>
        <li><a href="/truck" class="linkup">TRUCK</a></li>
        <li><a href="/motobike" class="linkup">BIKE</a></li>
        <li><a href="/plane" class="linkup">AVIATION</a></li>
    </ul>
</section>

<!-- FEATURED -->
<section class="pagethree">
    <h2 class="brows">Featured Posts</h2>
    <div id="featured-posts" class="post-container"></div>
</section>

<!-- TRENDING -->
<section class="pagethree">
    <h2 class="brows">Trending Posts</h2>
    <div id="trending-posts" class="post-container"></div>
</section>

<!-- RECENT -->
<section class="pagethree">
    <h2 class="brows">Recent Posts</h2>
    <div id="recent-posts" class="post-container"></div>
</section>

<footer class="footer">
    <div class="footer-content">
        <h2>INFO</h2>
        <p>Follow us on all social media platforms</p>
    </div>

    <ul class="list">
        <li><a class="big" href="https://www.instagram.com/mott_eck" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a class="big" href="https://x.com/motteck254?t=s82tjwt08Vy2TJAObwS63Q&s=09" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a></li>
        <li><a class="big" href="https://www.facebook.com/profile.php?id=100064234773365" target="_blank"><i class="fa-brands fa-facebook"></i></a></li>
    </ul>

    <div class="legal-links">
        <a href="{{ url_for('term') }}">Terms & Conditions</a>
        <span>•</span>
        <a href="{{ url_for('privacy') }}">Privacy Policy</a>
    </div>
</footer>

<!-- ================= SCRIPTS ================= -->
<script>

/* MENU */
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* HOMEPAGE PREVIEW ONLY */
function formatText(text) {
    if (!text) return "";

    // hide image urls on homepage preview only
    text = text.replace(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp)/gi, "");

    // clean spaces
    text = text.replace(/\n+/g, " ").replace(/\s+/g, " ").trim();

    // shorten text
    if (text.length > 220) {
        text = text.substring(0, 220);
        text = text.substring(0, text.lastIndexOf(" "));
        text += "...";
    }

    return `<p>${text}</p>`;
}

/* POST CARD */
function createPostCard(post) {

    let image = post.image || post.image_url || "/static/images/default.jpg";

    if (!image.startsWith("http")) {
        image = "/static/" + image;
    }

    const preview = post.description || "";

    let badge = "";
    if (post.is_sponsored) {
        badge = `<span class="badge sponsored">Sponsored</span>`;
    }

    return `
        <div class="post-card" id="post-${post.id}">
            ${badge}

            <a href="/post/${post.id}">
                <img src="${image}" class="post-image">
            </a>

            <div class="post-content">

                <a href="/post/${post.id}">
                    <h3 class="post-title">${post.title}</h3>
                </a>

                <p class="post-time">
                    ${post.time_ago || ""}
                </p>

                <div class="post-text preview-lines">
                    ${formatText(preview)}
                </div>

                <div class="post-actions">

                    <button id="like-btn-${post.id}">
                        ❤️ <span id="like-count-${post.id}">${post.likes || 0}</span>
                    </button>

                    <span class="views">
                        👁️ <span id="view-count-${post.id}">${post.views || 0}</span>
                    </span>

                    <a href="/post/${post.id}" class="see-more-btn">
                        Read More
                    </a>

                </div>
            </div>
        </div>
    `;
}

/* INIT FEATURES */
function initPostFeatures() {

    document.querySelectorAll(".post-card").forEach(card => {

        const likeBtn = card.querySelector("button[id^='like-btn-']");
        if (!likeBtn) return;

        const postId = likeBtn.id.replace("like-btn-", "");
        const key = `liked-${postId}`;

        if (localStorage.getItem(key)) {
            likeBtn.style.backgroundColor = "#d6eefd";
        }

        likeBtn.addEventListener("click", () => likePost(postId));
    });
}

/* LIKE */
function likePost(postId) {

    const key = `liked-${postId}`;

    if (localStorage.getItem(key)) {
        alert("You already liked this post!");
        return;
    }

    fetch(`/like/${postId}`, { method: "POST" })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById(`like-count-${postId}`).textContent = data.likes;
                localStorage.setItem(key, "true");
            }
        });
}

/* LOAD HOME POSTS */
async function loadHomePosts() {

    try {

        const res = await fetch("/get_home_posts");
        const data = await res.json();

        const featured = document.getElementById("featured-posts");
        const trending = document.getElementById("trending-posts");
        const recent = document.getElementById("recent-posts");

        featured.innerHTML = "";
        trending.innerHTML = "";
        recent.innerHTML = "";

        data.featured.forEach(post => {
            featured.innerHTML += createPostCard(post);
        });

        data.trending.forEach(post => {
            trending.innerHTML += createPostCard(post);
        });

        data.recent.forEach(post => {
            recent.innerHTML += createPostCard(post);
        });

        initPostFeatures();

    } catch (err) {
        console.error("Home load error:", err);
    }
}

document.addEventListener("DOMContentLoaded", loadHomePosts);

</script>

</body>
</html>
