<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTTECK</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

<header>
    <div class="header">
        <h1 class="title">
            <a href="{{ url_for('home') }}" style="text-decoration:none; color:inherit;">
                <i>MOTTECK</i>
            </a>
        </h1>

        <nav class="navbar">
            <ul class="unlist">
                <li><a href="{{ url_for('home') }}" class="list"><i class="fa-regular fa-house"></i></a></li>
                <li><a href="{{ url_for('about') }}" class="list">ABOUT</a></li>
                <li><a href="{{ url_for('services') }}" class="list">SERVICES</a></li>
                <li><a href="{{ url_for('contact') }}" class="list">CONTACT</a></li>
            </ul>
        </nav>
    </div>
</header>

<section>
    <div class="pageone">
        <h2 class="subtitle">INNOVATION, TECHNOLOGY IN AUTOMOTIVE ENGINEERING</h2>
    </div>
</section>

<section class="pagetwo">
    <h2 class="brows">BROWSING TYPE</h2>
    <ul class="unlisttwo">
        <li><a href="/cars" class="linkup">CARS</a></li>
        <li><a href="/trucks" class="linkup">TRUCKS</a></li>
        <li><a href="/motobikes" class="linkup">MOTOBIKES</a></li>
        <li><a href="/trains" class="linkup">TRAINS</a></li>
        <li><a href="/plane" class="linkup">AEROPLANE</a></li>
    </ul>
</section>

<!-- 🔥 Trending Section -->
<section class="pagethree">
    <h2 class="brows">🔥 Trending Posts</h2>
    <div id="trending-posts" class="post-container"></div>
</section>

<!-- 🆕 Recent Section -->
<section class="pagethree">
    <h2 class="brows">🆕 Recent Posts</h2>
    <div id="recent-posts" class="post-container"></div>
</section>

<script>
// See more button logic
function setupSeeMoreButtons() {
    const cards = document.querySelectorAll('.post-card');
    cards.forEach(card => {
        const seeMoreBtn = card.querySelector('.see-more-btn');
        const postText = card.querySelector('.post-text');
        if (!seeMoreBtn || !postText) return;

        const fullText = postText.innerHTML.trim();
        if (fullText.length <= 250) {
            seeMoreBtn.style.display = "none";
            return;
        }

        const shortText = fullText.slice(0, 250) + "...";
        let expanded = false;
        postText.innerHTML = shortText;

        seeMoreBtn.addEventListener("click", () => {
            expanded = !expanded;
            postText.innerHTML = expanded ? fullText : shortText;
            seeMoreBtn.textContent = expanded ? "See Less" : "See More";
        });
    });
}

// Create post card HTML
function createPostCard(post) {
    return `
        <div class="post-card" id="post-${post.id}">
            <img src="static/${post.image}" alt="${post.title}">
            <div class="post-content">
                <h3 class="post-title">${post.title}</h3>
                <p class="post-text">${post.description.replace(/\n/g, '<br>')}</p>
                <div class="post-actions">
                    <button id="like-btn-${post.id}" class="like-btn" onclick="likePost(${post.id})">
                        ❤️ <span id="like-count-${post.id}">${post.likes || 0}</span>
                    </button>
                    <button class="see-more-btn">See More</button>
                </div>
            </div>
        </div>
    `;
}

// Like a post
function likePost(postId) {
    const likedKey = `liked-${postId}`;
    if (localStorage.getItem(likedKey)) {
        alert("You already liked this post!");
        return;
    }

    fetch(`/like/${postId}`, { method: "POST" })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            document.getElementById(`like-count-${postId}`).textContent = data.likes;
            document.getElementById(`like-btn-${postId}`).style.backgroundColor = "#d6eefd";
            localStorage.setItem(likedKey, "true");
        }
    })
    .catch(err => console.error("Like error:", err));
}

// Fetch posts for homepage
fetch("/get_home_posts")
.then(res => res.json())
.then(data => {
    const trendingContainer = document.getElementById("trending-posts");
    const recentContainer = document.getElementById("recent-posts");

    trendingContainer.innerHTML = "";
    recentContainer.innerHTML = "";

    // Trending posts
    data.trending.forEach(post => {
        trendingContainer.innerHTML += createPostCard(post);
    });

    // Recent posts
    data.recent.forEach(post => {
        recentContainer.innerHTML += createPostCard(post);
    });

    setupSeeMoreButtons();

    // Restore liked buttons
    data.trending.concat(data.recent).forEach(post => {
        const likedKey = `liked-${post.id}`;
        const btn = document.getElementById(`like-btn-${post.id}`);
        if (btn && localStorage.getItem(likedKey)) {
            btn.style.backgroundColor = "#d6eefd";
        }
    });
})
.catch(err => console.error("Fetch error:", err));

</script>

<script src="{{ url_for('static', filename='post-manager.js')}}"></script>

</body>
</html>
