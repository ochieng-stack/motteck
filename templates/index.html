<body>

<!-- ================= NAVBAR ================= -->

    <!-- CENTER: SEARCH -->

    <!-- RIGHT: LINKS -->

        </a>

        <button class="menu-btn" onclick="toggleMenu()">
            ☰
        </button>

</header>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="mobile-menu">

    <a href="{{ url_for('home') }}">Home</a>
    <a href="/listings">Listings</a>
    <a href="{{ url_for('services') }}">Services</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>

</div>


<!-- ================= BROWSING ================= -->
<section class="pagetwo">
    <h2 class="brows">BROWSING TYPE</h2>

    <ul class="unlisttwo">
        <li><a href="/cars" class="linkup">CARS</a></li>
        <li><a href="/trucks" class="linkup">TRUCKS</a></li>
        <li><a href="/motobikes" class="linkup">MOTOBIKES</a></li>
        <li><a href="/trains" class="linkup">TRAINS</a></li>

    </ul>
</section>


<!-- ================= TRENDING ================= -->
<section class="pagethree">
    <h2 class="brows">🔥 Trending Posts</h2>
    <div id="trending-posts" class="post-container"></div>
</section>


<!-- ================= RECENT ================= -->
<section class="pagethree">
    <h2 class="brows">🆕 Recent Posts</h2>
    <div id="recent-posts" class="post-container"></div>
</section>


<!-- ================= SCRIPTS ================= -->
<script>
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* Search ready hook (we connect later) */
document.getElementById("searchInput")?.addEventListener("input", function(e) {
    console.log("Search:", e.target.value);
});
</script>


<script>
const LIMIT = 300;

/* FORMAT TEXT */
function formatText(text) {
    if (!text) return "";

    return text
        .split('\n')
        .filter(line => line.trim() !== '')
        .map(line => `<p>${line.trim()}</p>`)
        .join('');
}

/* SEE MORE */
function setupSeeMoreButtons() {
    document.querySelectorAll('.post-card').forEach(card => {
        const btn = card.querySelector('.see-more-btn');
        const textEl = card.querySelector('.post-text');

        if (!btn || !textEl) return;

        const fullHTML = textEl.innerHTML;
        const plainText = textEl.innerText;

        if (plainText.length <= LIMIT) {
            btn.style.display = "none";
            return;
        }

        const shortText = plainText.slice(0, LIMIT) + "...";
        let expanded = false;

        textEl.innerHTML = `<p>${shortText}</p>`;

        btn.addEventListener("click", (e) => {
            e.stopPropagation();
            expanded = !expanded;
            textEl.innerHTML = expanded ? fullHTML : `<p>${shortText}</p>`;
            btn.textContent = expanded ? "See Less" : "See More";
        });
    });
}

/* CARD */
function createPostCard(post) {
    let image = post.image || post.image_url || "/static/images/default.jpg";
    if (!image.startsWith("http")) image = "/static/" + image;

    return `
        <div class="post-card" id="post-${post.id}">

            <a href="/post/${post.id}">
                <img src="${image}" class="post-image">
            </a>

            <div class="post-content">

                <a href="/post/${post.id}" class="post-link">
                    <h3 class="post-title">${post.title}</h3>
                </a>

                <div class="post-text">
                    ${formatText(post.description)}
                </div>

                <div class="post-actions">

                    <button id="like-btn-${post.id}">
                        ❤️ <span id="like-count-${post.id}">${post.likes || 0}</span>
                    </button>

                    <span class="views">
                        👁️ <span id="view-count-${post.id}">${post.views || 0}</span>
                    </span>

                    <button class="see-more-btn">See More</button>

                </div>
            </div>
        </div>
    `;
}

/* LIKE */
function likePost(postId) {
    const key = `liked-${postId}`;

    if (localStorage.getItem(key)) {
        alert("You already liked this post!");
        return;
    }

    fetch(`/like/${postId}`, { method: "POST" })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById(`like-count-${postId}`).textContent = data.likes;
                localStorage.setItem(key, "true");
            }
        });
}

/* VIEW */
function incrementView(postId) {
    fetch(`/view/${postId}`, { method: "POST" })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const el = document.getElementById(`view-count-${postId}`);
                if (el) el.textContent = data.views;
            }
        });
}

/* LOAD */
async function loadHomePosts() {
    try {
        const res = await fetch("/get_home_posts");
        const data = await res.json();

        const trending = document.getElementById("trending-posts");
        const recent = document.getElementById("recent-posts");

        trending.innerHTML = "";
        recent.innerHTML = "";

        const allPosts = [...data.trending, ...data.recent];

        data.trending.forEach(post => {
            trending.innerHTML += createPostCard(post);
            incrementView(post.id);
        });

        data.recent.forEach(post => {
            recent.innerHTML += createPostCard(post);
            incrementView(post.id);
        });

        initPostFeatures();

    } catch (err) {
        console.error(err);
    }
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadHomePosts);
</script>

</body>
</html>
