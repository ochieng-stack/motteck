<!-- =================  FEATURED ================ -->
 <section class="pagethree">

</section>

<!-- ================= TRENDING ================= -->

</section>

<!-- ================= RECENT ================= -->
<section class="pagethree">
    <h2 class="brows"> Recent Posts</h2>
    <div id="recent-posts" class="post-container"></div>
</section>
<footer class="footer">
    <div class="footer-content">
        <h2>INFO</h2>

    <!-- SOCIAL ICONS -->
    <ul class="list">
        <li><a class="big" href="https://www.instagram.com/mott_eck" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a class="big" href="https://x.com/motteck254?t=s82tjwt08Vy2TJAObwS63Q&s=09" target="_blank"><i class="fa-brands fa-square-x-twitter"></i></a></li>
        <li><a class="big" href="https://www.facebook.com/profile.php?id=100064234773365" target="_blank"><i class="fa-brands fa-facebook"></i></a></li>

        <a href="{{ url_for('term') }}">Terms & Conditions</a>
        <span>•</span>
        <a href="{{ url_for('privacy') }}">Privacy Policy</a>
    </div>
</footer>

<!-- ================= SCRIPTS ================= -->
<script>

/* ================= MENU ================= */
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* ================= FORMAT TEXT ================= */
function formatText(text) {
    if (!text) return "";

    return text
        .split('\n')
        .filter(line => line.trim() !== '')
        .map(line => `<p>${line.trim()}</p>`)
        .join('');
}

/* ================= POST CARD ================= */
function createPostCard(post) {

    let image = post.image || post.image_url || "/static/images/default.jpg";
    if (!image.startsWith("http")) image = "/static/" + image;

    const preview = post.description
        ? post.description.slice(0, 180)
        : "";

    const showDots = post.description && post.description.length > 180;

    /* ⭐ Sponsored badge */
    let badge = "";
    if (post.is_sponsored) {
        badge = `<span class="badge sponsored">Sponsored</span>`;
    }

    return `
        <div class="post-card" id="post-${post.id}">
            ${badge}

            <a href="/post/${post.id}">
                <img src="${image}" class="post-image">
            </a>

            <div class="post-content">

                <a href="/post/${post.id}">
                    <h3 class="post-title">${post.title}</h3>
                </a>

                <p class="post-time">
                    ${post.time_ago || ""}
                </p>

                <div class="post-text">
                    ${formatText(preview)} ${showDots ? "..." : ""}
                </div>

                <div class="post-actions">

                    <button id="like-btn-${post.id}">
                        ❤️ <span id="like-count-${post.id}">${post.likes || 0}</span>
                    </button>

                    <span class="views">
                        👁️ <span id="view-count-${post.id}">${post.views || 0}</span>
                    </span>

                    <a href="/post/${post.id}" class="see-more-btn">
                        See More
                    </a>

                </div>
            </div>
        </div>
    `;
}

/* ================= INIT FEATURES ================= */
function initPostFeatures() {

    document.querySelectorAll(".post-card").forEach(card => {
        const likeBtn = card.querySelector("button[id^='like-btn-']");
        if (!likeBtn) return;

        const postId = likeBtn.id.replace("like-btn-", "");
        const key = `liked-${postId}`;

        if (localStorage.getItem(key)) {
            likeBtn.style.backgroundColor = "#d6eefd";
        }

        likeBtn.addEventListener("click", () => likePost(postId));
    });
}

/* ================= LIKE ================= */
function likePost(postId) {

    const key = `liked-${postId}`;

    if (localStorage.getItem(key)) {
        alert("You already liked this post!");
        return;
    }

    fetch(`/like/${postId}`, { method: "POST" })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById(`like-count-${postId}`).textContent = data.likes;
                localStorage.setItem(key, "true");
            }
        });
}

/* ================= SMART SPONSORED INSERTION ================= */
function mergeSponsored(posts, sponsored) {

    if (!sponsored || sponsored.length === 0) return posts;

    let result = [];
    let sIndex = 0;

    posts.forEach((post, i) => {
        result.push(post);

        // insert sponsored every 3 posts
        if ((i + 1) % 3 === 0 && sIndex < sponsored.length) {
            result.push(sponsored[sIndex]);
            sIndex++;
        }
    });

    // leftover sponsored
    while (sIndex < sponsored.length) {
        result.push(sponsored[sIndex]);
        sIndex++;
    }

    return result;
}

/* ================= LOAD HOME ================= */
async function loadHomePosts() {

    try {

        const res = await fetch("/get_home_posts");
        const data = await res.json();

        const featured = document.getElementById("featured-posts");
        const trending = document.getElementById("trending-posts");
        const recent = document.getElementById("recent-posts");

        featured.innerHTML = "";
        trending.innerHTML = "";
        recent.innerHTML = "";

        // FEATURED
        data.featured.forEach(post => {
            featured.innerHTML += createPostCard(post);
        });

        // TRENDING (max 5 from backend)
        data.trending.forEach(post => {
            trending.innerHTML += createPostCard(post);
        });

        // RECENT already includes sponsored inserted by backend
        data.recent.forEach(post => {
            recent.innerHTML += createPostCard(post);
        });

        initPostFeatures();

    } catch (err) {
        console.error("Home load error:", err);
    }
}
/* ================= START ================= */
document.addEventListener("DOMContentLoaded", loadHomePosts);

</script>

</body>
</html>
