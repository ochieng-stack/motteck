<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motteck - Bike</title>

<link rel="stylesheet" href="{{ url_for('static', filename='motobike.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1 class="title">
        <a href="{{ url_for('home') }}">MOTTECK</a>
    </h1>

    <div class="top-actions">
        <button class="menu-btn">☰</button>
    </div>
</header>

<!-- CATEGORY NAV -->
<nav class="category-nav">
    <a href="{{ url_for('car') }}">CAR</a>
    <a href="{{ url_for('truck') }}">TRUCK</a>
    <a href="{{ url_for('motobike') }}" class="active">BIKES</a>
    <a href="{{ url_for('plane') }}">AVIATION</a>
    <a href="{{ url_for('service') }}">SERVICE</a>
</nav>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="mobile-menu">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('service') }}">Service</a>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</div>

<!-- MAIN -->
<section class="main-section">

<!-- SEARCH -->
<div class="category-search">
    <input type="text" id="bikeSearch" placeholder="Search bikes only...">
</div>

<!-- POSTS -->
<div id="bikePost" class="post-container"></div>

</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-content">
        <h2>INFO</h2>
        <p>Follow us on all social media platforms</p>
    </div>

    <ul class="list">
        <li><a class="big" href="https://www.instagram.com/mott_eck"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a class="big" href="https://x.com/motteck254"><i class="fa-brands fa-square-x-twitter"></i></a></li>
        <li><a class="big" href="https://www.facebook.com/profile.php?id=100064234773365"><i class="fa-brands fa-facebook"></i></a></li>
    </ul>

    <div class="legal-links">
        <a href="{{ url_for('term') }}">Terms & Conditions</a>
        <span>•</span>
        <a href="{{ url_for('privacy') }}">Privacy Policy</a>
    </div>
</footer>

<script>

const category = "motobike";
const container = document.getElementById("bikePost");
const searchInput = document.getElementById("bikeSearch");

let allPosts = [];

/* MENU */
const menuBtn = document.querySelector(".menu-btn");
const menu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", e => {
    e.stopPropagation();
    menu.style.display =
        menu.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", e => {
    if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
        menu.style.display = "none";
    }
});

/* FORMAT TEXT */
function formatText(text){

    if(!text) return "";

    const imagePattern = /(https?:\/\/\S+\.(jpg|jpeg|png|gif|webp))/i;

    return text
        .split("\n")
        .filter(line => line.trim() !== "")
        .map(line => {

            const cleanLine = line.trim();

            // If line is image link only
            if(imagePattern.test(cleanLine)){
                return `
                    <img 
                        src="${cleanLine}" 
                        style="
                            width:100%;
                            max-height:320px;
                            object-fit:cover;
                            border-radius:10px;
                            margin:12px 0;
                        ">
                `;
            }

            return `<p>${cleanLine}</p>`;
        })
        .join("");
}

/* GET POSTS */
function getPosts(){
    return fetch("/get_posts?t=" + Date.now())
        .then(res => res.json())
        .then(posts =>
            posts.filter(p => p.category === category)
        )
        .catch(() => []);
}

/* CREATE CARD */
function createPostCard(post){

    let badge = "";

    if(post.is_featured){
        badge += `<span class="badge featured">Featured</span>`;
    }

    if(post.is_sponsored){
        badge += `<span class="badge sponsored">Sponsored</span>`;
    }

    const card = document.createElement("div");
    card.className = "post-card";

    card.innerHTML = `
        ${badge}

        <a href="/post/${post.id}">
            <img src="${post.image_url}">
        </a>

        <div class="post-content">

            <a href="/post/${post.id}">
                <h3>${post.title}</h3>
            </a>

            <p class="meta">
                👁️ ${post.views || 0}
                • ❤️ ${post.likes || 0}
                • 🕒 ${post.time_ago || ""}
            </p>

            <div class="post-text">
                ${formatText(post.description || "")}
            </div>

            <div class="post-actions">

                <button id="like-${post.id}">
                    Like (${post.likes || 0})
                </button>

                {% if logged_in %}
                <button onclick="deletePost(${post.id})">
                    Delete
                </button>
                {% endif %}

            </div>

        </div>
    `;

    card.querySelector(`#like-${post.id}`).onclick = () => {
        fetch(`/like/${post.id}`, {
            method:"POST"
        })
        .then(r => r.json())
        .then(d => {
            card.querySelector(`#like-${post.id}`).innerText =
                `Like (${d.likes})`;
        });
    };

    return card;
}

/* RENDER */
function render(posts){

    container.innerHTML = "";

    if(!posts.length){
        container.innerHTML = "<p>No bike posts found.</p>";
        return;
    }

    posts.forEach(post => {
        container.appendChild(createPostCard(post));
    });
}

/* LOAD */
function load(){
    getPosts().then(data => {
        allPosts = data;
        render(allPosts);
    });
}

/* SEARCH */
searchInput.addEventListener("input", e => {

    const value = e.target.value.toLowerCase();

    const filtered = allPosts.filter(post =>
        (post.title || "").toLowerCase().includes(value) ||
        (post.description || "").toLowerCase().includes(value)
    );

    render(filtered);
});

/* DELETE */
function deletePost(id){

    if(!confirm("Delete this post?")) return;

    fetch(`/delete_post/${id}`, {
        method:"DELETE"
    })
    .then(() => load());
}

/* START */
load();

</script>

</body>
</html>
